[build]
  command = "corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm --filter @workspace/admin-dashboard run build"
  publish = "artifacts/artifacts/admin-dashboard/dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
